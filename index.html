<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">我的博客</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <!-- 预加载 PDF.js 库 -->
  <link rel="preload" href="pdf.min.js" as="script">
  <link rel="preload" href="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" as="script">
  <style>
  /* ===== CSS 变量：默认主题 ===== */
  :root,[data-theme="indigo"]{
    --bg:#f8fafc;--bg2:#f1f5f9;--card:#fff;--hover:#f1f5f9;
    --accent:#6366f1;--accent-l:#818cf8;--accent-d:#4f46e5;
    --glow:rgba(99,102,241,.25);--soft:rgba(99,102,241,.08);
    --text:#1e293b;--text2:#64748b;--muted:#94a3b8;--border:#e2e8f0;
    --ok:#10b981;--warn:#f59e0b;--err:#ef4444;
    --g1:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#d946ef 100%);
    --g2:linear-gradient(135deg,#f8fafc,#f1f5f9);
    --sh:0 4px 20px rgba(0,0,0,.08);--sh-lg:0 10px 40px rgba(0,0,0,.12);
    --r:12px;--r-lg:20px;--nav-bg:rgba(255,255,255,.85);
  }
  [data-theme="rose"]{--accent:#e11d48;--accent-l:#fb7185;--accent-d:#be123c;--glow:rgba(225,29,72,.25);--soft:rgba(225,29,72,.08);--g1:linear-gradient(135deg,#e11d48,#f43f5e,#fb923c)}
  [data-theme="emerald"]{--accent:#059669;--accent-l:#34d399;--accent-d:#047857;--glow:rgba(5,150,105,.25);--soft:rgba(5,150,105,.08);--g1:linear-gradient(135deg,#059669,#34d399,#a3e635)}
  [data-theme="amber"]{--accent:#d97706;--accent-l:#fbbf24;--accent-d:#b45309;--glow:rgba(217,119,6,.25);--soft:rgba(217,119,6,.08);--g1:linear-gradient(135deg,#d97706,#fbbf24,#f97316)}
  [data-theme="ocean"]{--accent:#0284c7;--accent-l:#38bdf8;--accent-d:#0369a1;--glow:rgba(2,132,199,.25);--soft:rgba(2,132,199,.08);--g1:linear-gradient(135deg,#0284c7,#38bdf8,#818cf8)}
  [data-theme="purple"]{--accent:#9333ea;--accent-l:#c084fc;--accent-d:#7e22ce;--glow:rgba(147,51,234,.25);--soft:rgba(147,51,234,.08);--g1:linear-gradient(135deg,#9333ea,#c084fc,#f472b6)}
  [data-theme="sunset"]{--accent:#f97316;--accent-l:#fb923c;--accent-d:#ea580c;--glow:rgba(249,115,22,.25);--soft:rgba(249,115,22,.08);--g1:linear-gradient(135deg,#f97316,#fb923c,#facc15)}
  [data-theme="mint"]{--accent:#10b981;--accent-l:#34d399;--accent-d:#059669;--glow:rgba(16,185,129,.25);--soft:rgba(16,185,129,.08);--g1:linear-gradient(135deg,#10b981,#6ee7b7,#a7f3d0)}
  [data-theme="dark"]{
    --bg:#0a0a0f;--bg2:#12121a;--card:#1a1a24;--hover:#22222e;
    --accent:#818cf8;--accent-l:#a5b4fc;--accent-d:#6366f1;
    --glow:rgba(129,140,248,.3);--soft:rgba(129,140,248,.1);
    --text:#f1f1f4;--text2:#a1a1aa;--muted:#71717a;--border:#27272a;
    --g1:linear-gradient(135deg,#6366f1,#8b5cf6,#d946ef);
    --g2:linear-gradient(135deg,#1a1a24,#12121a);
    --sh:0 4px 20px rgba(0,0,0,.3);--sh-lg:0 10px 40px rgba(0,0,0,.4);
    --nav-bg:rgba(10,10,15,.85);
  }

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Noto Sans SC',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden;transition:background .4s,color .4s}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  ul{list-style:none}

  /* 背景光晕 */
  .bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(circle at 20% 50%,var(--glow) 0%,transparent 50%),
               radial-gradient(circle at 80% 20%,var(--glow) 0%,transparent 50%);
    opacity:.5;transition:background .4s}

  /* 滚动进度 */
  #scroll-bar{position:fixed;top:0;left:0;width:0;height:3px;background:var(--g1);z-index:1002;transition:width .1s}

  /* 返回顶部 */
  #back-top{position:fixed;bottom:2rem;right:2rem;width:48px;height:48px;
    background:var(--g1);border:none;border-radius:14px;color:#fff;font-size:1.3rem;
    cursor:pointer;opacity:0;visibility:hidden;transform:translateY(20px);
    transition:all .3s;z-index:999;box-shadow:var(--sh-lg);display:flex;align-items:center;justify-content:center}
  #back-top.show{opacity:1;visibility:visible;transform:translateY(0)}
  #back-top:hover{transform:translateY(-3px) scale(1.05)}

  /* ===== 导航 ===== */
  nav{position:fixed;top:0;left:0;right:0;z-index:1001;padding:.9rem 2rem;
    background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);transition:all .3s}
  nav.scrolled{padding:.6rem 2rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .nav-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
  .logo{font-size:1.3rem;font-weight:700;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .nav-links{display:flex;gap:2rem}
  .nav-links a{color:var(--text2);font-size:.9rem;font-weight:500;transition:color .3s;position:relative}
  .nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--accent);border-radius:1px;transition:width .3s}
  .nav-links a:hover::after,.nav-links a.active::after{width:100%}
  .nav-links a:hover,.nav-links a.active{color:var(--accent)}
  .nav-right{display:flex;align-items:center;gap:.8rem;position:relative}
  .theme-btn{width:38px;height:38px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .3s}
  .theme-btn:hover{border-color:var(--accent);background:var(--soft)}
  .theme-panel{position:absolute;top:calc(100% + 8px);right:0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem;box-shadow:var(--sh-lg);display:none;flex-wrap:wrap;gap:.6rem;width:220px;z-index:100}
  .theme-panel.show{display:flex}
  .tp-label{width:100%;font-size:.78rem;color:var(--muted);font-weight:600;margin-bottom:.2rem}
  .tp-opt{width:36px;height:36px;border-radius:10px;border:2px solid transparent;cursor:pointer;transition:all .3s;position:relative}
  .tp-opt:hover{transform:scale(1.15)}
  .tp-opt.active{border-color:var(--text)}
  .tp-opt.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.3)}
  .tp-opt[data-t="indigo"]{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
  .tp-opt[data-t="rose"]{background:linear-gradient(135deg,#e11d48,#f43f5e)}
  .tp-opt[data-t="emerald"]{background:linear-gradient(135deg,#059669,#34d399)}
  .tp-opt[data-t="amber"]{background:linear-gradient(135deg,#d97706,#fbbf24)}
  .tp-opt[data-t="ocean"]{background:linear-gradient(135deg,#0284c7,#38bdf8)}
  .tp-opt[data-t="purple"]{background:linear-gradient(135deg,#9333ea,#c084fc)}
  .tp-opt[data-t="sunset"]{background:linear-gradient(135deg,#f97316,#facc15)}
  .tp-opt[data-t="mint"]{background:linear-gradient(135deg,#10b981,#6ee7b7)}
  .tp-opt[data-t="dark"]{background:linear-gradient(135deg,#1e1e2e,#6366f1)}

  /* 语言切换按钮 */
  .lang-btn{width:38px;height:38px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:.75rem;font-weight:600;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .3s}
  .lang-btn:hover{border-color:var(--accent);background:var(--soft);color:var(--accent)}

  /* ========== 高级动效系统 ========== */

  /* 背景光晕 - 呼吸式流动 */
  .bg-orb{
    position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
  }
  .bg-orb::before{
    content:'';position:absolute;width:600px;height:600px;
    top:-200px;left:-200px;
    background:radial-gradient(circle,var(--accent) 0%,transparent 70%);
    opacity:.15;filter:blur(80px);
    animation:orbFloat1 15s ease-in-out infinite;
  }
  .bg-orb::after{
    content:'';position:absolute;width:500px;height:500px;
    bottom:-150px;right:-150px;
    background:radial-gradient(circle,var(--accent-l) 0%,transparent 70%);
    opacity:.12;filter:blur(60px);
    animation:orbFloat2 18s ease-in-out infinite;
  }
  @keyframes orbFloat1{
    0%,100%{transform:translate(0,0) scale(1)}
    33%{transform:translate(100px,50px) scale(1.1)}
    66%{transform:translate(50px,100px) scale(.9)}
  }
  @keyframes orbFloat2{
    0%,100%{transform:translate(0,0) scale(1)}
    50%{transform:translate(-80px,-60px) scale(1.15)}
  }

  /* 标题渐变 - 流光效果 */
  @keyframes titleGlow{
    0%{background-position:0% center}
    50%{background-position:200% center}
    100%{background-position:0% center}
  }
  .hero h1 .hl{
    background:var(--g1);
    background-size:300% 100%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    animation:titleGlow 5s ease infinite;
    filter:drop-shadow(0 0 20px var(--glow));
  }

  /* 按钮 - 液态光泽 */
  @keyframes liquidShine{
    0%{background-position:-200% center}
    50%{background-position:200% center}
    100%{background-position:-200% center}
  }
  .btn-primary{
    background:var(--g1);
    background-size:300% 100%;
    animation:liquidShine 4s ease infinite;
    position:relative;overflow:hidden;
  }
  .btn-primary::before{
    content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
    animation:btnShine 3s ease-in-out infinite;
  }
  @keyframes btnShine{
    0%,100%{left:-100%}
    50%{left:100%}
  }
  .btn-primary:hover{transform:translateY(-3px);box-shadow:0 12px 35px var(--glow)}

  /* 统计数字 - 脉冲发光 */
  @keyframes statPulse{
    0%,100%{filter:drop-shadow(0 0 8px var(--glow))}
    50%{filter:drop-shadow(0 0 20px var(--accent))}
  }
  .stat-num{
    background:var(--g1);
    background-size:300% 100%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    animation:statPulse 3s ease-in-out infinite;
  }

  /* 头像 - 悬浮光晕 */
  .hero-avatar{
    animation:avatarFloat 6s ease-in-out infinite;
    position:relative;
  }
  .hero-avatar::before{
    content:'';position:absolute;inset:-8px;border-radius:38px;
    background:linear-gradient(135deg,var(--accent),var(--accent-l),var(--accent));
    background-size:200% 200%;
    animation:avatarGlow 4s ease infinite;
    z-index:-1;opacity:.5;filter:blur(15px);
  }
  @keyframes avatarFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-12px)}
  }
  @keyframes avatarGlow{
    0%,100%{background-position:0% 50%}
    50%{background-position:100% 50%}
  }

  /* 卡片悬浮 - 优雅上浮 */
  .proj-card,.art-card,.gal-item{
    transition:all .4s cubic-bezier(.25,.46,.45,.94);
  }
  .proj-card:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:0 25px 60px rgba(0,0,0,.12),0 0 0 1px var(--accent);
  }
  .art-card:hover{
    transform:translateY(-8px) scale(1.01);
    box-shadow:0 20px 50px rgba(0,0,0,.1),0 0 0 1px var(--accent);
  }
  .gal-item:hover{
    transform:translateY(-8px) scale(1.03);
    box-shadow:0 20px 50px rgba(0,0,0,.1),0 0 0 1px var(--accent);
  }

  /* 技能标签 - 悬浮发光 */
  .skill-tag{
    transition:all .3s ease;
  }
  .skill-tag:hover{
    background:var(--accent) !important;color:#fff !important;
    transform:translateY(-2px);
    box-shadow:0 6px 20px var(--glow);
  }

  /* 导航链接 - 下划线动画 */
  .nav-links a::after{
    content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;
    background:var(--accent);border-radius:1px;
    transition:width .3s ease,width .3s ease;
  }
  .nav-links a:hover::after,.nav-links a.active::after{width:100%}

  /* 背景装饰网格 - 微光脉动 */
  #bg-grid{
    animation:gridPulse 10s ease-in-out infinite;
  }
  @keyframes gridPulse{
    0%,100%{opacity:.3}
    50%{opacity:.6}
  }

  /* 联系卡片 - 悬浮高亮 */
  .contact-card:hover{
    transform:translateY(-5px);
    box-shadow:0 15px 40px rgba(0,0,0,.1);
    border-color:var(--accent);
  }
  .contact-card:hover .contact-icon{
    background:var(--accent);
    color:#fff;
    transform:scale(1.1);
    transition:all .3s ease;
  }

  /* 头像装饰环 - 旋转 */
  .about-ava-wrap::before{
    animation:spin 25s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* 时间线 - 淡入滑入 */
  .tl-item{opacity:0;transform:translateX(-20px);transition:all .5s ease}
  .tl-item.visible{opacity:1;transform:translateX(0)}

  /* 滚动进度条 - 渐变流光 */
  #scroll-bar{
    background:linear-gradient(90deg,var(--accent),var(--accent-l),var(--accent));
    background-size:200% 100%;
    animation:progressShine 2s linear infinite;
  }
  @keyframes progressShine{
    0%{background-position:0% 0}
    100%{background-position:200% 0}
  }

  /* 返回顶部按钮 - 悬浮浮现 */
  #back-top{opacity:0;transform:translateY(20px)}
  #back-top.show{opacity:1;transform:translateY(0)}
  #back-top:hover{transform:translateY(-5px) scale(1.1)}

  /* 灯箱/弹窗 - 缩放淡入 */
  .lightbox,.modal,.video-modal,.pdf-modal{
    animation:fadeInScale .3s ease;
  }
  @keyframes fadeInScale{
    from{opacity:0;transform:scale(.95)}
    to{opacity:1;transform:scale(1)}
  }


  /* 移动端汉堡 */
  .hamburger{display:none;width:38px;height:38px;background:none;border:1px solid var(--border);border-radius:10px;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px}
  .hamburger span{display:block;width:18px;height:2px;background:var(--text);border-radius:1px;transition:all .3s}
  .hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
  .hamburger.open span:nth-child(2){opacity:0}
  .hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

  /* ===== 通用 ===== */
  main{position:relative;z-index:1}
  .section{padding:5.5rem 2rem}
  .container{max-width:1200px;margin:0 auto}
  .sec-header{text-align:center;margin-bottom:3.5rem}
  .sec-badge{display:inline-block;background:var(--soft);color:var(--accent);padding:.35rem 1rem;border-radius:50px;font-size:.78rem;font-weight:600;font-family:'Fira Code',monospace;margin-bottom:.8rem;letter-spacing:.5px}
  .sec-title{font-size:2.2rem;font-weight:700;margin-bottom:.8rem}
  .sec-desc{color:var(--text2);max-width:560px;margin:0 auto}

  .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.8rem;border-radius:10px;font-weight:600;font-size:.92rem;transition:all .3s;cursor:pointer;border:none;text-decoration:none}
  .btn-primary{background:var(--g1);color:#fff;box-shadow:0 4px 15px var(--glow)}
  .btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border)}

  .fade-in{opacity:0;transform:translateY(25px);transition:all .7s cubic-bezier(.16,1,.3,1)}
  .fade-in.vis{opacity:1;transform:translateY(0)}

  /* ===== Hero ===== */
  .hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:7rem 2rem 4rem;position:relative;overflow:hidden}
  .hero-content{max-width:780px;text-align:center;position:relative}
  .hero-avatar{width:110px;height:110px;margin:0 auto 2rem;border-radius:30px;background:var(--g1);display:flex;align-items:center;justify-content:center;font-size:3rem;box-shadow:0 8px 30px var(--glow)}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .hero-badge{display:inline-flex;align-items:center;gap:.5rem;background:var(--card);border:1px solid var(--border);padding:.4rem 1rem;border-radius:50px;font-size:.82rem;color:var(--text2);margin-bottom:1.8rem}
  .hero-badge .dot{width:8px;height:8px;background:var(--ok);border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .hero h1{font-size:3.2rem;font-weight:700;margin-bottom:1.2rem;line-height:1.25}
  .hero-desc{font-size:1.1rem;color:var(--text2);max-width:560px;margin:0 auto 2.5rem;line-height:1.8}
  .hero-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
  .hero-stats{display:flex;justify-content:center;gap:3.5rem;margin-top:3.5rem;padding-top:2.5rem;border-top:1px solid var(--border)}
  .stat-item{text-align:center}
  .stat-lbl{color:var(--muted);font-size:.85rem;margin-top:.2rem}

  /* ===== 作品 ===== */
  .projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1.8rem}
  .proj-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
  .proj-thumb{height:200px;display:flex;align-items:center;justify-content:center;font-size:4rem;position:relative;overflow:hidden}
  .proj-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.3))}
  .proj-body{padding:1.5rem}
  .proj-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.8rem}
  .proj-tag{background:var(--soft);color:var(--accent);padding:.2rem .6rem;border-radius:6px;font-size:.75rem;font-weight:500}
  .proj-body h3{font-size:1.15rem;margin-bottom:.5rem}
  .proj-body p{color:var(--text2);font-size:.88rem;line-height:1.6}
  .proj-link{display:inline-flex;align-items:center;gap:.3rem;color:var(--accent);font-size:.88rem;font-weight:500;margin-top:1rem;transition:gap .3s}
  .proj-card:hover .proj-link{gap:.6rem}
  .proj-actions{display:flex;align-items:center;gap:1rem;margin-top:1rem;flex-wrap:wrap}
  .proj-video-link{display:inline-flex;align-items:center;gap:.35rem;color:#00a1d6;font-size:.85rem;font-weight:500;padding:.35rem .8rem;border-radius:50px;background:rgba(0,161,214,.08);border:1px solid rgba(0,161,214,.2);text-decoration:none;transition:all .3s}
  .proj-video-link:hover{background:rgba(0,161,214,.15);border-color:rgba(0,161,214,.4);color:#0086b3}
  .proj-video-link svg{flex-shrink:0}
  .proj-doc-link{display:inline-flex;align-items:center;gap:.35rem;color:var(--accent);font-size:.85rem;font-weight:500;padding:.35rem .8rem;border-radius:50px;background:var(--soft);border:1px solid var(--border);text-decoration:none;transition:all .3s;cursor:pointer}
  .proj-doc-link:hover{background:var(--glow);border-color:var(--accent)}

  /* ===== 相册 ===== */
  .gallery-section{background:var(--bg2)}
  .gal-filters{display:flex;justify-content:center;gap:.6rem;flex-wrap:wrap;margin-bottom:2.5rem}
  .filter-btn{padding:.5rem 1.2rem;border-radius:50px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:.85rem;cursor:pointer;transition:all .3s}
  .filter-btn.active,.filter-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
  .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem}
  .gal-item{border-radius:var(--r);overflow:hidden;cursor:pointer;position:relative;aspect-ratio:4/3;background:var(--card);border:1px solid var(--border);transition:all .4s}
  .gal-item:hover{transform:translateY(-5px);box-shadow:var(--sh-lg);border-color:var(--accent)}
  .gal-item img,.gal-ph{width:100%;height:100%;object-fit:cover;transition:transform .5s}
  .gal-item:hover img{transform:scale(1.05)}
  .gal-ph{display:flex;align-items:center;justify-content:center;font-size:3rem;background:var(--g1)}
  .gal-overlay{position:absolute;bottom:0;left:0;right:0;padding:1rem;background:linear-gradient(to top,rgba(0,0,0,.7),transparent);color:#fff;transform:translateY(100%);transition:transform .3s}
  .gal-item:hover .gal-overlay{transform:translateY(0)}
  .gal-overlay h4{font-size:.95rem;margin-bottom:.2rem}
  .gal-overlay p{font-size:.8rem;opacity:.8}

  /* 灯箱 */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;display:none;align-items:center;justify-content:center;cursor:zoom-out}
  .lightbox.show{display:flex}
  .lightbox img{max-width:90vw;max-height:85vh;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .lb-close{position:absolute;top:2rem;right:2rem;width:48px;height:48px;background:rgba(255,255,255,.15);border:none;border-radius:50%;color:#fff;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .3s}
  .lb-close:hover{background:rgba(255,255,255,.3)}
  .lb-caption{position:absolute;bottom:2rem;color:#fff;text-align:center;width:100%;font-size:.95rem}

  /* 视频弹窗 */
  .video-modal{position:fixed;inset:0;z-index:3000;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s}
  .video-modal.show{opacity:1}
  .video-modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.75)}
  .video-modal-box{position:relative;width:90%;max-width:860px;background:#1a1a24;border-radius:16px;overflow:hidden;box-shadow:0 25px 80px rgba(0,0,0,.5);transform:scale(.95);transition:transform .3s}
  .video-modal.show .video-modal-box{transform:scale(1)}
  .video-modal-header{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.2rem;background:rgba(255,255,255,.05);color:#fff;font-size:.95rem;font-weight:500}
  .video-modal-close{width:32px;height:32px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
  .video-modal-close:hover{background:rgba(255,255,255,.25)}
  .video-modal-body{position:relative;width:100%;padding-bottom:56.25%;height:0}
  .video-modal-body iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

  /* ===== 文章 ===== */
  .articles-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1.8rem}
  .art-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:all .4s;cursor:pointer}
  .art-card:hover{transform:translateY(-5px);box-shadow:var(--sh-lg)}
  .art-thumb{height:180px;background:var(--g2);display:flex;align-items:center;justify-content:center;font-size:2.5rem;position:relative}
  .art-thumb::after{content:'';position:absolute;inset:0;background:var(--soft)}
  .art-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .art-body{padding:1.3rem}
  .art-meta{display:flex;gap:.8rem;font-size:.8rem;color:var(--muted);margin-bottom:.6rem}
  .art-meta .cat{color:var(--accent);font-weight:500}
  .art-body h3{font-size:1.1rem;margin-bottom:.5rem;line-height:1.4}
  .art-body p{color:var(--text2);font-size:.88rem;line-height:1.6}

  /* ===== 关于 ===== */
  .about-section{background:var(--bg2)}
  .about-layout{display:grid;grid-template-columns:auto 1fr;gap:4rem;align-items:start}
  .about-ava-wrap{position:relative;width:260px;height:260px}
  .about-ava{width:100%;height:100%;background:var(--g1);border-radius:30px;display:flex;align-items:center;justify-content:center;font-size:5rem;box-shadow:0 10px 40px var(--glow)}
  .about-ava-wrap::before{content:'';position:absolute;inset:-12px;border:2px dashed var(--accent);border-radius:38px;opacity:.3;animation:spin 20s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .about-text h3{font-size:1.6rem;margin-bottom:1rem}
  .about-text p{color:var(--text2);margin-bottom:.8rem;line-height:1.8}
  .skills{display:flex;flex-wrap:wrap;gap:.6rem;margin-top:1.5rem}
  .skill-tag{background:var(--card);border:1px solid var(--border);padding:.4rem .9rem;border-radius:8px;font-size:.82rem;color:var(--text2);transition:all .3s}
  .skill-tag:hover{border-color:var(--accent);color:var(--accent)}

  /* 时间线 */
  .timeline{position:relative;max-width:700px;margin:3rem auto 0}
  .timeline::before{content:'';position:absolute;left:20px;top:0;bottom:0;width:2px;background:var(--border)}
  .tl-item{position:relative;padding-left:52px;margin-bottom:2rem}
  .tl-dot{position:absolute;left:12px;top:6px;width:18px;height:18px;background:var(--card);border:3px solid var(--accent);border-radius:50%;z-index:1}
  .tl-body{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem}
  .tl-year{color:var(--accent);font-weight:600;font-size:.85rem;margin-bottom:.3rem}
  .tl-body h4{font-size:1rem;margin-bottom:.3rem}
  .tl-body p{color:var(--text2);font-size:.88rem}

  /* ===== 联系 ===== */
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;max-width:900px;margin:0 auto}
  .contact-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;display:flex;align-items:center;gap:1rem;transition:all .3s}
  .contact-card:hover{border-color:var(--accent);transform:translateY(-3px)}
  .contact-icon{width:48px;height:48px;background:var(--soft);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
  .contact-card h4{font-size:.95rem;margin-bottom:.2rem}
  .contact-card p{color:var(--text2);font-size:.88rem}

  /* ===== 扫码下载区域 ===== */
  .software-section{padding:60px 0;background:var(--bg2);transition:background .4s}
  .software-content{display:flex;justify-content:center;margin-top:30px}
  .qrcode-wrap{background:#fff;border-radius:16px;padding:24px;box-shadow:var(--sh);
    transition:all .3s;cursor:pointer}
  .qrcode-wrap:hover{transform:translateY(-5px);box-shadow:var(--sh-lg)}
  .qrcode-wrap img{max-width:200px;max-height:200px;border-radius:8px}
  .qrcode-tip{text-align:center;margin-top:12px;font-size:13px;color:var(--text2)}
  @media(max-width:600px){
    .qrcode-wrap{padding:16px}
    .qrcode-wrap img{max-width:160px;max-height:160px}
  }
  /* ===== Footer ===== */
  footer{background:var(--bg2);border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--muted);font-size:.85rem}

  /* ===== 文章 Modal ===== */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:2rem}
  .modal.show{display:flex}
  .modal-box{background:var(--card);border-radius:var(--r-lg);max-width:800px;width:100%;margin:auto;position:relative}
  .modal-close{position:absolute;top:1.2rem;right:1.2rem;width:36px;height:36px;background:var(--bg2);border:none;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .2s;z-index:1}
  .modal-close:hover{background:var(--err);color:#fff}
  .modal-body{padding:2.5rem}
  .md-content h1{font-size:1.8rem;margin:1rem 0 .6rem}
  .md-content h2{font-size:1.4rem;margin:.8rem 0 .5rem;padding-bottom:.3rem;border-bottom:1px solid var(--border)}
  .md-content h3{font-size:1.15rem;margin:.7rem 0 .4rem}
  .md-content p{margin:.6rem 0;color:var(--text2);line-height:1.8}
  .md-content strong{color:var(--text);font-weight:600}
  .md-content em{color:var(--accent);font-style:normal}
  .md-content ul{margin:.6rem 0;padding-left:1.5rem;list-style:disc}
  .md-content li{margin:.3rem 0;color:var(--text2)}
  .md-content a{color:var(--accent);text-decoration:underline}
  .md-content img{max-width:100%;border-radius:8px;margin:1rem 0}
  .md-content code{background:var(--bg2);padding:2px 6px;border-radius:4px;font-family:'Fira Code',monospace;font-size:.88rem}
  .md-content pre{background:#1e1e2e;color:#cdd6f4;padding:1rem;border-radius:8px;overflow-x:auto;margin:1rem 0}
  .md-content pre code{background:none;padding:0;color:inherit}
  .md-content blockquote{border-left:3px solid var(--accent);padding-left:1rem;margin:.8rem 0;color:var(--text2)}

  /* ===== 响应式 ===== */
  @media(max-width:968px){
    .about-layout{grid-template-columns:1fr;text-align:center}
    .about-ava-wrap{margin:0 auto;width:200px;height:200px}
    .skills{justify-content:center}
  }
  @media(max-width:768px){
    .hamburger{display:flex}
    .nav-links{display:none;position:absolute;top:100%;left:0;right:0;background:var(--nav-bg);backdrop-filter:blur(20px);flex-direction:column;padding:1rem 2rem;gap:0;border-bottom:1px solid var(--border)}
    .nav-links.show{display:flex}
    .nav-links a{padding:.8rem 0;display:block}
    .nav-links a::after{display:none}
    .hero{padding:6rem 1.5rem 3rem}
    .hero h1{font-size:2rem}
    .hero-stats{flex-direction:column;gap:1.2rem}
    .projects-grid,.articles-grid{grid-template-columns:1fr}
    .contact-grid{grid-template-columns:1fr}
    .section{padding:4rem 1.5rem}
    .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
  }

  /* ===== 图片秒加载优化 ===== */
  /* 骨架屏闪烁动画 */
  @keyframes shimmer {
    0%{background-position:-200% 0}
    100%{background-position:200% 0}
  }
  @keyframes imgFadeIn {
    from{opacity:0;transform:scale(0.98)}
    to{opacity:1;transform:scale(1)}
  }
  /* 图片加载完成淡入效果 */
  .img-fade-in{animation:imgFadeIn .4s ease-out}
  /* 图片加载完成 */
  .img-loaded{opacity:1!important}
  /* 移除文章和作品卡片的延迟效果 */
  .art-thumb img{opacity:1!important}
  .proj-thumb img{opacity:1!important}
  /* 强制隐藏破裂图片图标 */
  .gal-item img[src=""],
  .gal-item img:not([src]){display:none}
  .gal-item .img-skeleton{position:absolute;inset:0;background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite}
  .gal-item .img-loaded{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

  /* ===== PDF 弹窗 ===== */
  .proj-pdf-link{display:inline-flex;align-items:center;gap:.35rem;color:#e11d48;font-size:.85rem;font-weight:500;padding:.35rem .8rem;border-radius:50px;background:rgba(225,29,72,.08);border:1px solid rgba(225,29,72,.2);cursor:pointer;transition:all .3s;text-decoration:none}
  .proj-pdf-link:hover{background:rgba(225,29,72,.18);border-color:rgba(225,29,72,.4);color:#be123c}
  .pdf-modal{position:fixed;inset:0;z-index:3000;display:none;align-items:center;justify-content:center;opacity:0;transition:opacity .3s}
  .pdf-modal.show{display:flex;opacity:1}
  .pdf-modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.7)}
  .pdf-modal-box{position:relative;width:92%;max-width:900px;height:85vh;background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 25px 80px rgba(0,0,0,.5);transform:scale(.95);transition:transform .3s;display:flex;flex-direction:column}
  .pdf-modal.show .pdf-modal-box{transform:scale(1)}
  .pdf-modal-header{display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.2rem;background:var(--bg2);color:var(--text);font-size:.92rem;font-weight:500;border-bottom:1px solid var(--border);flex-shrink:0}
  .pdf-modal-header-left{display:flex;align-items:center;gap:.8rem;min-width:0}
  .pdf-modal-header-left span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pdf-modal-actions{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
  .pdf-nav-btn{width:32px;height:32px;background:var(--soft);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-weight:bold;line-height:1}
  .pdf-nav-btn:hover{background:var(--glow);border-color:var(--accent)}
  .pdf-nav-btn:disabled{opacity:.35;cursor:default}
  .pdf-page-info{font-size:.82rem;color:var(--text2);font-family:'Fira Code',monospace;min-width:60px;text-align:center}
  .pdf-download-btn{font-size:.78rem;color:var(--accent);text-decoration:none;padding:.3rem .7rem;border-radius:6px;background:var(--soft);border:1px solid transparent;transition:all .2s;white-space:nowrap}
  .pdf-download-btn:hover{border-color:var(--accent)}
  .pdf-close-btn{width:32px;height:32px;background:rgba(239,68,68,.1);border:none;border-radius:8px;color:#ef4444;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;margin-left:.3rem;flex-shrink:0}
  .pdf-close-btn:hover{background:rgba(239,68,68,.25)}
  .pdf-modal-body{flex:1;overflow:auto;padding:1.5rem;display:flex;flex-direction:column;align-items:center;background:var(--bg);position:relative}
  #pdf-canvas{box-shadow:0 2px 20px rgba(0,0,0,.15);border-radius:4px;max-width:100%;height:auto !important}
  .pdf-loading{color:var(--muted);font-size:.92rem;padding:3rem}
  .pdf-error{color:var(--err);font-size:.92rem;padding:3rem;text-align:center}
  .pdf-loading::before{content:'';display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-right:.5rem;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>

        <div class="pdf-modal-actions">
          <button class="pdf-nav-btn" id="pdf-prev" onclick="window.pdfChangePage(-1)" title="上一页"><span data-i18n="pdf_prev">‹</span></button>
          <span class="pdf-page-info" id="pdf-page-info">0 / 0</span>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <!-- 页面加载时静默预加载 PDF.js（用户打开 PDF 时已就绪，秒开） -->
  <script>
    (function () {
      var script = document.createElement('script');
      // 版本锁定 + ?v= 查询参数防止缓存失效时加载旧版本
      script.src = (function () {
        var base = location.pathname.replace(/\/[^/]*$/, '');
        return (base || '') + '/pdf.min.js?v=174';
      })();
      script.onload = function () {
        if (typeof pdfjsLib !== 'undefined') {
          // 指向本地同源 worker 文件，避免 CDN 跨域 worker 问题
          var base = location.pathname.replace(/\/[^/]*$/, '');
          pdfjsLib.GlobalWorkerOptions.workerSrc = (base || '') + '/pdf.worker.min.js';
          // 通知 index.js：PDF.js 已就绪
          window._pdfJsPreloaded = true;
        }
      };
      document.head.appendChild(script);
    })();
  </script>
  <script src="index.js"></script>
</body>
